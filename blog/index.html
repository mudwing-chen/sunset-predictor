<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博客 · 陈鸿宇</title>
<link rel="icon" href="/assets/icon.svg">
<style>
:root{--bg:#111;--bg2:#1a1a1a;--bg3:#222;--text:#f5f5f7;--text2:#86868b;--text3:#555;--accent:#f5a623;--border:#2a2a2a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei','Noto Serif SC',serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100vh}

.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;background:rgba(17,17,17,0.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.05)}
.nav-l{display:flex;align-items:center;gap:8px}
.nav-l a{color:var(--text);text-decoration:none;font-size:15px;font-weight:600}
.nav-r{display:flex;gap:4px}
.nav-r a{color:var(--text2);text-decoration:none;font-size:13px;padding:8px 14px;border-radius:8px;transition:all .2s;font-weight:500}
.nav-r a:hover,.nav-r a.active{color:var(--text);background:rgba(255,255,255,0.08)}
@media(max-width:640px){.nav-r a{padding:8px 6px;font-size:11px}}

.page{max-width:700px;margin:0 auto;padding:80px 24px 40px}
.back{display:inline-block;color:var(--text2);text-decoration:none;font-size:13px;margin-bottom:24px;padding:6px 12px;border-radius:8px;border:1px solid var(--border)}
.back:hover{color:var(--text);border-color:var(--text3)}

/* List */
.page-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:10px}
.page-header h1{font-size:28px;font-weight:700}
.archive-btn{font-size:12px;color:var(--text3);background:none;border:1px solid var(--border);padding:4px 12px;border-radius:6px;cursor:pointer;font-family:inherit;transition:all .2s}
.archive-btn:hover,.archive-btn.active{color:var(--accent);border-color:var(--accent)}
.post-list{display:grid;gap:16px;margin-top:24px}
.post-card{display:block;padding:20px;border-radius:12px;background:var(--bg2);border:1px solid var(--border);text-decoration:none;color:var(--text);transition:all .2s}
.post-card:hover{border-color:var(--text3);transform:translateY(-2px)}
.post-card .meta{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-size:12px}
.post-card .tag{padding:2px 8px;border-radius:4px;background:rgba(245,166,35,0.15);color:var(--accent);font-size:10px;font-weight:600;letter-spacing:1px}
.post-card .date{color:var(--text3)}
.post-card h2{font-size:18px;font-weight:600;margin-bottom:4px}
.post-card p{font-size:13px;color:var(--text2);line-height:1.6}
.empty-state{text-align:center;padding:60px 0;color:var(--text3)}
.empty-state p{font-size:14px;margin-top:8px}
.months{display:flex;gap:6px;flex-wrap:wrap;margin:16px 0 8px}
.months button{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--text3);font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s}
.months button:hover,.months button.active{color:var(--accent);border-color:var(--accent)}

/* Detail */
.post-title{font-size:clamp(24px,4vw,32px);font-weight:700;line-height:1.4;margin-bottom:8px}
.post-meta{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text3);margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.post-content{font-size:17px;line-height:2;color:var(--text2)}
.post-content p{margin-bottom:1.2em}
.post-content br{content:'';display:block;margin:0.6em 0}
.post-content img{max-width:100%;border-radius:12px;margin:24px 0;display:block}
.post-footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--border);text-align:center}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-l"><a href="/">📷 陈鸿宇</a></div>
  <div class="nav-r">
    <a href="/">首页</a>
    <a href="/gallery/">作品</a>
    <a href="/blog/" class="active">博客</a>
    <a href="/tool/">工具</a>
    <a href="/about/">关于</a>
  </div>
</nav>

<div class="page" id="app"></div>

<script src="/blog/posts.js"></script>
<script>
const $ = id => document.getElementById(id);
const esc = s => {const d=document.createElement('div');d.textContent=s;return d.innerHTML};

function render() {
  const params = new URLSearchParams(location.search);
  const postId = params.get('id');

  if (postId) {
    renderDetail(postId);
  } else {
    renderList();
  }
}

function renderList() {
  const params = new URLSearchParams(location.search);
  const monthFilter = params.get('month');

  // Get unique months
  const months = [...new Set(POSTS.map(p => p.date.slice(0,7)))].sort().reverse();

  let filtered = [...POSTS];
  if (monthFilter) {
    filtered = filtered.filter(p => p.date.startsWith(monthFilter));
  }
  filtered.sort((a,b) => b.date.localeCompare(a.date));

  let monthsHtml = months.map(m => {
    const label = m.replace('-', '年') + '月';
    const active = m === monthFilter ? 'active' : '';
    return `<button class="${active}" onclick="location='?month=${m}'">${label}</button>`;
  }).join('');

  let listHtml = filtered.length
    ? filtered.map(p => {
      const slug = p.title.toLowerCase().replace(/[^\w一-龥-]/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'') || 'post';
      return `
      <a class="post-card" href="/blog/posts/${slug}.html">
        <div class="meta">
          <span class="tag">${esc(p.tag)}</span>
          <span class="date">${p.date}</span>
        </div>
        <h2>${esc(p.title)}</h2>
        <p>${esc(p.summary)}</p>
      </a>
    `}).join('')
    : '<div class="empty-state"><p style="font-size:32px">📭</p><p>还没有文章</p></div>';

  const app = document.getElementById('app');
  app.innerHTML = `
    <a href="/blog/" class="back" style="${monthFilter ? '' : 'visibility:hidden'}">← 全部文章</a>
    <div class="page-header">
      <h1>博客</h1>
      <button class="archive-btn" onclick="document.getElementById('months').classList.toggle('hidden')">📁 归档</button>
    </div>
    <div id="months" class="months">${monthsHtml}</div>
    <div class="post-list">${listHtml}</div>
  `;
}

function renderDetail(id) {
  const post = POSTS.find(p => p.id == id);
  if (!post) {
    document.getElementById('app').innerHTML = '<div class="empty-state"><p style="font-size:32px">🔍</p><p>文章不存在</p><a href="/blog/" class="back" style="margin-top:16px">← 返回博客</a></div>';
    return;
  }

  // Convert plain text to HTML paragraphs
  const paragraphs = post.content.split(/\n\n+/).map(b => b.trim()).filter(Boolean);
  let bodyHtml = paragraphs.map(para => {
    const lines = para.split('\n').filter(Boolean);
    if (lines.length <= 1) return `<p>${esc(lines[0])}</p>`;
    return lines.map(l => l.trim() ? `<p>${esc(l)}</p>` : '<br>').join('');
  }).join('');

  // Handle inline images (markdown-like ![](url))
  bodyHtml = bodyHtml.replace(/!\[(.*?)\]\((.*?)\)/g, '<img src="$2" alt="$1">');

  const app = document.getElementById('app');
  app.innerHTML = `
    <a href="/blog/" class="back">← 返回博客</a>
    <article>
      <h1 class="post-title">${esc(post.title)}</h1>
      <div class="post-meta">
        <span class="tag">${esc(post.tag)}</span>
        <span>${post.date}</span>
      </div>
      <div class="post-content">${bodyHtml}</div>
    </article>
    <div class="post-footer">
      <a href="/blog/" class="back" style="border:none;color:var(--text2)">← 返回博客</a>
    </div>
  `;
}

render();
</script>
</body>
</html>
