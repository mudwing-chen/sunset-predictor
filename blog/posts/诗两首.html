<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>诗两首 · 陈鸿宇</title>
<script>
(function(){var s=localStorage.getItem('siteTheme');if(s==='dark'||(s!=='light'&&window.matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})();
</script><link rel="icon" href="/assets/icon.svg">
<style>
:root{--bg:#f8f9fa;--bg2:#ffffff;--bg3:#eef0f2;--text:#1a1c20;--text2:#5c6068;--text3:#9ca0a8;--accent:#6b7a8f;--border:#dde0e4}
:root.dark{--bg:#111;--bg2:#1a1a1a;--bg3:#222;--text:#f5f5f7;--text2:#86868b;--text3:#555;--accent:#f5a623;--border:#2a2a2a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,0.06)}
:root.dark .nav{background:rgba(17,17,17,0.8);border-bottom-color:rgba(255,255,255,0.05)}
.nav-l a{color:var(--text);text-decoration:none;font-size:15px;font-weight:600}
.nav-r{display:flex;align-items:center;gap:4px}
.nav-r a{color:var(--text2);text-decoration:none;font-size:13px;padding:8px 14px;border-radius:8px;transition:all .2s;font-weight:500}
.nav-r a:hover{color:var(--text);background:rgba(0,0,0,0.06)}
:root.dark .nav-r a:hover{background:rgba(255,255,255,0.08)}
#themeBtn{background:none;border:1px solid var(--border);border-radius:8px;padding:4px 8px;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;margin-left:4px}
#themeBtn:hover{color:var(--text);border-color:var(--text3)}
@media(max-width:640px){.nav-r a{padding:8px 6px;font-size:11px}}
.page{max-width:700px;margin:0 auto;padding:80px 24px 40px}
.back{display:inline-block;color:var(--text2);text-decoration:none;font-size:13px;margin-bottom:24px;padding:6px 12px;border-radius:8px;border:1px solid var(--border)}
.back:hover{color:var(--text);border-color:var(--text3)}
.post-title{font-size:clamp(24px,4vw,32px);font-weight:700;line-height:1.4;margin-bottom:8px;color:var(--text)}
.post-meta{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--text3);margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.post-tag{padding:2px 8px;border-radius:4px;background:rgba(107,122,143,0.15);color:var(--accent);font-size:10px;font-weight:600;letter-spacing:1px}
:root.dark .post-tag{background:rgba(107,122,143,0.15)}
.post-content{font-size:17px;line-height:2;color:var(--text2)}
.post-content p{margin-bottom:1.2em}
.post-content br{content:'';display:block;margin:0.6em 0}
.post-content img{max-width:100%;border-radius:12px;margin:24px 0;display:block}
</style>
</head>
<body>
<nav class="nav" style="display:flex;align-items:center;justify-content:space-between">
  <div class="nav-l"><a href="/">📷 陈鸿宇</a></div>
  <div class="nav-r">
    <a href="/">首页</a>
    <a href="/gallery/">作品</a>
    <a href="/blog/">博客</a>
    <a href="/tool/">工具</a>
    <a href="/about/">关于</a>
    <button id="themeBtn" onclick="Theme.toggle()" style="background:none;border:1px solid var(--border);border-radius:8px;padding:4px 8px;font-size:12px;cursor:pointer;color:var(--text2);font-family:inherit;margin-left:4px"></button>
  </div>
</nav>
<div class="page">
  <a href="/blog/" class="back">← 返回博客</a>
  <article>
    <h1 class="post-title">诗两首</h1>
    <div class="post-meta"><span class="post-tag">诗</span><span>2025.05.01</span></div>
    <div class="post-content">
<p>多少春秋昏度世，数载浮生何变如？<br>重登旧榭观澄日，唯叹西天悬浊月。</p>
<br>
<p>当太阳穿越云层，在海面折射出五彩的光斑<br>当恒星衰老死亡，爆发剧烈的宇宙射线<br>我相信，若是时间足够，大海中的两滴水总会相遇<br>我相信，我们也曾短暂相遇，那是物质的湮灭与重组</p>
</div>
  </article>
</div>
<script>
const Theme={init(){const s=localStorage.getItem('blogTheme');if(s==='light')this.setLight(false);else if(s==='dark')this.setDark(false);else if(window.matchMedia('(prefers-color-scheme:dark)').matches)this.setDark(false);else this.setLight(false)},setLight(s){document.documentElement.classList.remove('dark');this._updateBtn(false);if(s)localStorage.setItem('blogTheme','light')},setDark(s){document.documentElement.classList.add('dark');this._updateBtn(true);if(s)localStorage.setItem('blogTheme','dark')},toggle(){const d=document.documentElement.classList.toggle('dark');localStorage.setItem('blogTheme',d?'dark':'light');this._updateBtn(d)},_updateBtn(d){const b=document.getElementById('themeBtn');if(b)b.textContent=d?'☀️':'🌙'}};Theme.init();
</script>
</body>
</html>
