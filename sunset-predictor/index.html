<html lang="zh-CN">

  <style>
    *, *::before, *::after { -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    /* Hero cards */
    .hero { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
    .hero-card {
      position: relative; border-radius: 20px; padding: 20px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
      backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
      cursor: pointer; transition: all 0.3s; overflow: hidden;
    }
    .hero-card::before {
      content: ''; position: absolute; inset: 0; border-radius: 20px;
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 50%);
      pointer-events: none;
    }
    .hero-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.14); }
    .hero-best {
      background: linear-gradient(135deg, rgba(245,158,11,0.10), rgba(245,158,11,0.03));
      border-color: rgba(245,158,11,0.18);
    }
    .hero-best::before { background: linear-gradient(135deg, rgba(245,158,11,0.08) 0%, transparent 50%); }
    .hero-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .hero-tag { display: flex; align-items: center; gap: 8px; }
    .hero-tag span:first-child { font-size: 18px; }
    .hero-tag span:last-child { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.88); letter-spacing: -0.2px; }
    .hero-time { font-size: 11px; color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; font-weight: 500; }
    .hero-score { display: flex; align-items: baseline; gap: 4px; }
    .hero-num { font-size: 48px; font-weight: 700; letter-spacing: -2px; line-height: 1; }
    @media (max-width:640px) { .hero-num { font-size: 40px; } }
    .hero-lbl { font-size: 15px; font-weight: 500; margin-left: 4px; }
    .hero-bar { height: 4px; border-radius: 4px; background: rgba(255,255,255,0.06); margin-top: 12px; overflow: hidden; }
    .hero-fill { height: 100%; border-radius: 4px; transition: width 0.6s; }
    .hero-fill-best { background: linear-gradient(90deg, #f59e0b, #f97316); }
    .hero-fill-mid { background: linear-gradient(90deg, rgba(255,255,255,0.2), rgba(255,255,255,0.4)); }
    .hero-desc { font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.5; margin-top: 10px; }

    /* Weather bar */
    .weather-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .weather-item { border-radius: 14px; padding: 14px 12px; text-align: center; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(16px); }
    .weather-item .val { font-size: 18px; font-weight: 700; color: rgba(255,255,255,0.85); }
    .weather-item .lbl { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    @media (max-width:640px) { .weather-bar { grid-template-columns: repeat(2,1fr); } }

    /* Cloud timeline */
    .tl-panel { border-radius: 20px; padding: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(20px); margin-bottom: 16px; }
    .tl-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .tl-title { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.4); letter-spacing: 1px; }
    .tl-now { font-size: 11px; color: #f59e0b; font-weight: 500; }
    .tl-chart { display: flex; gap: 4px; align-items: flex-end; height: 64px; overflow-x: auto; padding-bottom: 4px; }
    .tl-col { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 28px; }
    .tl-bars { display: flex; gap: 2px; align-items: flex-end; height: 44px; }
    .tl-bar { width: 6px; border-radius: 3px 3px 0 0; }
    .tl-high { background: #f59e0b; opacity: 0.7; }
    .tl-mid { background: #f97316; opacity: 0.6; }
    .tl-low { background: rgba(255,255,255,0.25); opacity: 0.4; }
    .tl-hour { font-size: 9px; color: rgba(255,255,255,0.25); }
    .tl-legend { display: flex; gap: 14px; margin-top: 10px; }
    .tl-legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: rgba(255,255,255,0.3); }
    .tl-legend-dot { width: 8px; height: 8px; border-radius: 2px; }

    /* Factor panel */
    .factor-panel { border-radius: 20px; padding: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(20px); margin-bottom: 16px; }
    .fp-title { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; }
    .fp-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .fp-label { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.45); width: 90px; flex-shrink: 0; }
    .fp-bar { flex: 1; height: 5px; border-radius: 5px; background: rgba(255,255,255,0.05); overflow: hidden; }
    .fp-fill { height: 100%; border-radius: 5px; background: linear-gradient(90deg, rgba(245,158,11,0.5), rgba(245,158,11,0.85)); transition: width 0.6s; }
    .fp-value { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.3); width: 44px; text-align: right; }

    /* Mini cards (tomorrow) */
    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .mini-card { border-radius: 16px; padding: 16px; cursor: pointer; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); backdrop-filter: blur(20px); transition: all 0.2s; }
    .mini-card:hover { background: rgba(255,255,255,0.06); }
    .mini-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .mini-name { display: flex; align-items: center; gap: 6px; }
    .mini-name span:first-child { font-size: 14px; }
    .mini-name span:last-child { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.7); }
    .mini-time { font-size: 10px; color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.04); padding: 2px 8px; border-radius: 12px; }
    .mini-score { font-size: 28px; font-weight: 700; letter-spacing: -1px; }
    .mini-bar { height: 3px; border-radius: 3px; background: rgba(255,255,255,0.05); margin-top: 8px; overflow: hidden; }
    .mini-fill { height: 100%; border-radius: 3px; }

    /* Multi-day trend */
    .trend { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; }
    .trend-day { min-width: 52px; text-align: center; padding: 10px 4px; border-radius: 12px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); }
    .trend-dow { font-size: 10px; color: rgba(255,255,255,0.25); margin-bottom: 4px; }
    .trend-icon { font-size: 16px; margin-bottom: 4px; }
    .trend-score { font-size: 15px; font-weight: 700; }
    .trend-label { font-size: 9px; color: rgba(255,255,255,0.2); margin-top: 2px; }

    /* Section */
    .sec-label { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.25); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
    .sec-divider { display: flex; align-items: center; gap: 14px; margin: 20px 0 14px; }
    .sec-divider::after { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,255,255,0.08), transparent); }

    /* Skeleton */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .card-skeleton { border-radius: 20px; padding: 20px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); animation: pulse 2s cubic-bezier(0.4,0,0.6,1) infinite; }
  </style>

<body style="background:linear-gradient(170deg,#08080e 0%,#14100d 40%,#120c08 65%,#0a0a14 100%);color:white;min-height:100vh;margin:0">
  <div id="app" class="min-h-screen" style="padding: 20px 16px 40px; max-width: 920px; margin: 0 auto;">

  <style>

  <!-- Application Code (deferred) -->
  <script defer>
    // ====== Location Module ======
// Simple HTML escape
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
const LocationModule = {
  state: {
    latitude: null,
    longitude: null,
    cityName: '定位中...',
    isLoading: false,
    error: null
  },

  // Get current position via browser geolocation
  async getCurrentPosition() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error('浏览器不支持地理定位'));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
        err => {
          switch(err.code) {
            case err.PERMISSION_DENIED: reject(new Error('定位权限被拒绝')); break;
            case err.POSITION_UNAVAILABLE: reject(new Error('无法获取位置')); break;
            case err.TIMEOUT: reject(new Error('定位超时')); break;
            default: reject(new Error('定位失败'));
          }
        },
        { enableHighAccuracy: false, timeout: 10000 }
      );
    });
  },

  // Reverse geocode to get city name
  async reverseGeocode(lat, lng) {
    try {
      const resp = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=zh&zoom=10`,
        { headers: { 'User-Agent': 'SunsetPredictor/1.0' } }
      );
      const data = await resp.json();
      return data.display_name || `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
    } catch {
      return `${lat.toFixed(4)}°N, ${lng.toFixed(4)}°E`;
    }
  },

  // Search city by name
  async searchCity(query) {
    try {
      const resp = await fetch(
        `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&accept-language=zh`,
        { headers: { 'User-Agent': 'SunsetPredictor/1.0' } }
      );
      return await resp.json();
    } catch (err) {
      throw new Error('搜索地点失败');
    }
  },

  // Set location and trigger data refresh
  async setLocation(lat, lng) {
    // Validate coordinates
    if (lat < -90 || lat > 90 || lng < -180 || lng > 180) {
      throw new Error('无效的坐标');
    }
    this.state.latitude = lat;
    this.state.longitude = lng;
    this.state.cityName = await this.reverseGeocode(lat, lng);
    this.state.error = null;
    // Trigger the main data fetch (defined later in App Controller)
    if (typeof App !== 'undefined' && App.updateLocation) {
      App.updateLocation(this.state.cityName, lat, lng);
    }
  },

  // Initialize - try geolocation first
  async init() {
    try {
      this.state.isLoading = true;
      const pos = await this.getCurrentPosition();
      await this.setLocation(pos.lat, pos.lng);
    } catch (err) {
      this.state.error = err.message;
      // Default to Hangzhou
      this.state.cityName = '杭州 (默认)';
      await this.setLocation(30.2741, 120.1551);
    } finally {
      this.state.isLoading = false;
    }
  }
};
    // ====== SunCalc Module ======
const SunCalcModule = {
  // Get all relevant sun times for a location
  getSunTimes(lat, lng, date = new Date()) {
    const times = SunCalc.getTimes(date, lat, lng);
    return {
      sunrise: times.sunrise,
      sunset: times.sunset,
      goldenHourEnd: times.goldenHourEnd,
      goldenHour: times.goldenHour,
      dawn: times.dawn,
      dusk: times.dusk,
      nauticalDawn: times.nauticalDawn,
      nauticalDusk: times.nauticalDusk,
      solarNoon: times.solarNoon
    };
  },

  // Get sun azimuth at a specific time
  getSunAzimuth(lat, lng, time) {
    const pos = SunCalc.getPosition(time, lat, lng);
    return {
      azimuth: pos.azimuth,
      altitude: pos.altitude
    };
  },

  // Get sun azimuth at sunrise/sunset
  getSunriseSunsetAzimuth(lat, lng, date = new Date()) {
    const times = this.getSunTimes(lat, lng, date);
    const sunriseAz = this.getSunAzimuth(lat, lng, times.sunrise);
    const sunsetAz = this.getSunAzimuth(lat, lng, times.sunset);
    return {
      sunriseAzimuth: sunriseAz.azimuth,
      sunsetAzimuth: sunsetAz.azimuth,
      sunriseAltitude: sunriseAz.altitude,
      sunsetAltitude: sunsetAz.altitude
    };
  },

  // Format a Date to HH:mm string
  formatTime(date) {
    if (!date || isNaN(date.getTime())) return '--:--';
    const h = date.getHours().toString().padStart(2, '0');
    const m = date.getMinutes().toString().padStart(2, '0');
    return `${h}:${m}`;
  },

  // Get golden hour and blue hour ranges
  getPhotoTimes(lat, lng, date = new Date()) {
    const times = this.getSunTimes(lat, lng, date);
    return {
      morningGolden: { start: times.sunrise, end: times.goldenHourEnd },
      eveningGolden: { start: times.goldenHour, end: times.sunset },
      morningBlue: { start: times.dawn, end: times.sunrise },
      eveningBlue: { start: times.sunset, end: times.dusk }
    };
  },

  // Check if any sun times are valid (not polar day/night)
  hasValidTimes(lat, lng, date = new Date()) {
    const times = this.getSunTimes(lat, lng, date);
    return times.sunrise && times.sunset &&
           !isNaN(times.sunrise.getTime()) &&
           !isNaN(times.sunset.getTime());
  }
};
    // ====== Weather Module ======
const WeatherModule = {
  WEATHER_URL: 'https://api.open-meteo.com/v1/forecast',
  AIR_QUALITY_URL: 'https://air-quality-api.open-meteo.com/v1/air-quality',

  async fetchWeather(lat, lng) {
    const params = new URLSearchParams({
      latitude: lat,
      longitude: lng,
      hourly: 'temperature_2m,relative_humidity_2m,cloud_cover,cloud_cover_low,cloud_cover_mid,cloud_cover_high,visibility,precipitation,wind_speed_10m,wind_direction_10m',
      daily: 'temperature_2m_max,temperature_2m_min,precipitation_sum',
      timezone: 'auto',
      forecast_days: 7
    });
    const resp = await fetch(`${this.WEATHER_URL}?${params}`);
    if (!resp.ok) throw new Error(`天气数据获取失败 (${resp.status})`);
    return await resp.json();
  },

  async fetchAirQuality(lat, lng) {
    const params = new URLSearchParams({
      latitude: lat,
      longitude: lng,
      hourly: 'european_aqi',
      timezone: 'auto',
      forecast_days: 7
    });
    const resp = await fetch(`${this.AIR_QUALITY_URL}?${params}`);
    if (!resp.ok) return null;
    return await resp.json();
  },

  // Moon phase for a given date
  getMoonPhase(date) {
    return SunCalc.getMoonIllumination(date);
  },

  getMoonTimes(lat, lng, date) {
    return SunCalc.getMoonTimes(date, lat, lng);
  },

  // Wind direction to text
  windDirText(deg) {
    if (deg === null || deg === undefined) return '';
    const dirs = ['北', '东北', '东', '东南', '南', '西南', '西', '西北'];
    return dirs[Math.round(deg / 45) % 8];
  },

  async fetchOffsetWeather(lat, lng) {
    const params = new URLSearchParams({
      latitude: lat,
      longitude: lng,
      hourly: 'cloud_cover',
      timezone: 'auto',
      forecast_days: 2
    });
    try {
      const resp = await fetch(`${this.WEATHER_URL}?${params}`);
      if (!resp.ok) return null;
      return await resp.json();
    } catch {
      return null;
    }
  },

  calculateOffset(lat, lng, azimuthRad, distanceKm) {
    const earthRadius = 6371;
    const latRad = lat * Math.PI / 180;
    const lngRad = lng * Math.PI / 180;
    const angularDist = distanceKm / earthRadius;

    const newLatRad = Math.asin(
      Math.sin(latRad) * Math.cos(angularDist) +
      Math.cos(latRad) * Math.sin(angularDist) * Math.cos(azimuthRad)
    );
    const newLngRad = lngRad + Math.atan2(
      Math.sin(azimuthRad) * Math.sin(angularDist) * Math.cos(latRad),
      Math.cos(angularDist) - Math.sin(latRad) * Math.sin(newLatRad)
    );

    return {
      lat: newLatRad * 180 / Math.PI,
      lng: newLngRad * 180 / Math.PI
    };
  },

  getHourlyData(data, targetTime) {
    if (!data || !data.hourly || !data.hourly.time) return null;
    const times = data.hourly.time;
    const targetMs = targetTime.getTime();
    let closestIdx = 0;
    let closestDiff = Infinity;

    for (let i = 0; i < times.length; i++) {
      const diff = Math.abs(new Date(times[i]).getTime() - targetMs);
      if (diff < closestDiff) {
        closestDiff = diff;
        closestIdx = i;
      }
    }

    const result = { index: closestIdx, diffMinutes: closestDiff / 60000 };
    for (const key in data.hourly) {
      if (key !== 'time') {
        result[key] = data.hourly[key][closestIdx];
      }
    }
    return result;
  },

  async fetchAll(lat, lng, sunriseTime, sunsetTime, sunriseAzimuth, sunsetAzimuth) {
    const [weather, airQuality] = await Promise.all([
      this.fetchWeather(lat, lng),

  },

  scoreCloudOffset(targetCloud, offsetCloud, hasOffsetData) {
    if (!hasOffsetData || offsetCloud === null || offsetCloud === undefined) return 0.7;

    if (!targetGood) return 0.5;

    if (offsetCloud < 40) return 0.8;
    if (offsetCloud < 70) return 0.5;
    return 0.2;
  },

  scoreAQI(aqi) {
    if (aqi === null || aqi === undefined) return 0.6;
    if (aqi < 20) return 0.4;

    if (aqi <= 150) return 0.6;
    if (aqi <= 200) return 0.3;
    return 0.1;
  },

  scoreVisibility(visibility) {
    if (visibility === null || visibility === undefined) return 0.6;

  },

  scoreRainBonus(weatherData, targetTime) {
    if (!weatherData || !weatherData.hourly || !weatherData.hourly.precipitation) return 0;
    const times = weatherData.hourly.time;
    const precip = weatherData.hourly.precipitation;
    const targetIdx = this._findClosestIndex(times, targetTime);
    let hadRain = false;
    for (let i = Math.max(0, targetIdx - 6); i < targetIdx; i++) {
      if (precip[i] > 0.5) hadRain = true;
    }
    const targetPrecip = precip[targetIdx] || 0;
    const nowClear = targetPrecip < 0.3;
    if (hadRain && nowClear) return 1.0;
    if (hadRain) return 0.5;
    return 0;
  },

  _findClosestIndex(times, targetTime) {
    const targetMs = targetTime.getTime();
    let closestIdx = 0;
    let closestDiff = Infinity;
    for (let i = 0; i < times.length; i++) {
      const diff = Math.abs(new Date(times[i]).getTime() - targetMs);
      if (diff < closestDiff) { closestDiff = diff; closestIdx = i; }
    }
    return closestIdx;
  },

  scoreTimeFit(hourlyData, sunTime) {
    if (!hourlyData || !hourlyData.time) return 0.5;

    const diffMin = Math.abs(dataTime.getTime() - sunTime.getTime()) / 60000;

    const rainBonus = this.scoreRainBonus(weatherFull, sunTime);
    const timeFitScore = this.scoreTimeFit(data.hourly, sunTime);

    const weights = { cloud: 0.30, offset: 0.20, aqi: 0.15, visibility: 0.15, rain: 0.10, timeFit: 0.10 };
    const total = (
      cloudScore * weights.cloud +
      cloudOffsetScore * weights.offset +
      aqiScore * weights.aqi +
      visibilityScore * weights.visibility +
      rainBonus * weights.rain +
      timeFitScore * weights.timeFit
    );

    const finalScore = Math.round(total * 10 * 10) / 10;

    return {
      score: finalScore,
      level: this.getLevel(finalScore),
      label: this.getLabel(finalScore),
      description: this.generateDescription(cloudScore, cloudOffsetScore, aqiScore, visibilityScore, rainBonus, isSunrise),

              btn.addEventListener('click', () => {
                const lat = parseFloat(btn.dataset.lat);
                const lng = parseFloat(btn.dataset.lng);
                const name = results[parseInt(btn.dataset.idx)].display_name;
                App.selectSearchResult(lat, lng, name);
              });
            });
          } catch {
            document.getElementById('searchResults').innerHTML =
              '<p class="text-xs text-slate-500">搜索失败，请重试</p>';
          }
        });

        document.getElementById('retryBtn')?.addEventListener('click', () => {
          UIModule.hideError();
          LocationModule.init();
        });

        // Register Service Worker
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
          });
        }

        // Network status
        window.addEventListener('online', () => {
          UIModule.hideError();
          LocationModule.init();
        });
        window.addEventListener('offline', () => {
          UIModule.showError('网络已断开，显示可能不是最新数据');
        });

        await LocationModule.init();
      },

      selectSearchResult(lat, lng, name) {
        LocationModule.state.cityName = name;
        LocationModule.setLocation(lat, lng);
        document.getElementById('searchPanel').classList.add('hidden');
        document.getElementById('searchInput').value = '';
        document.getElementById('searchResults').innerHTML = '';
      },

      async updateLocation(name, lat, lng) {
        UIModule.showLoading();
        UIModule.hideError();
        UIModule.updateLocationDisplay(name, lat, lng);

        try {
          const today = new Date();
          const tomorrow = new Date(today);
          tomorrow.setDate(tomorrow.getDate() + 1);

          const todayTimes = SunCalcModule.getPhotoTimes(lat, lng, today);
          const tomorrowTimes = SunCalcModule.getPhotoTimes(lat, lng, tomorrow);

          if (!SunCalcModule.hasValidTimes(lat, lng, today)) {
            UIModule.hideLoading();
            UIModule.showError('该地区当前处于极昼或极夜，无日出/日落数据');
            return;
          }

          const todayAz = SunCalcModule.getSunriseSunsetAzimuth(lat, lng, today);
          const tomorrowAz = SunCalcModule.getSunriseSunsetAzimuth(lat, lng, tomorrow);

          const allData = await WeatherModule.fetchAll(
            lat, lng,
            todayTimes.morningGolden.start, todayTimes.eveningGolden.end,
            todayAz.sunriseAzimuth, todayAz.sunsetAzimuth
          );

          // Today scores
          const todaySunrise = ScoringModule.calculate(
            allData.sunrise, allData.weather, true,
            todayTimes.morningGolden.start, todayAz.sunriseAzimuth
          );
          todaySunrise.timeRange = SunCalcModule.formatTime(todayTimes.morningGolden.start) +
            '-' + SunCalcModule.formatTime(todayTimes.morningGolden.end);

          const todaySunset = ScoringModule.calculate(
            allData.sunset, allData.weather, false,
            todayTimes.eveningGolden.end, todayAz.sunsetAzimuth
          );
          todaySunset.timeRange = SunCalcModule.formatTime(todayTimes.eveningGolden.start) +
            '-' + SunCalcModule.formatTime(todayTimes.eveningGolden.end);

          // Tomorrow scores (use second day of allData)
          let tomorrowSunrise = null, tomorrowSunset = null;
          if (SunCalcModule.hasValidTimes(lat, lng, tomorrow)) {
            // Re-use allData but re-fetch the hourly data at tomorrow's times
            const tomSD = WeatherModule.getHourlyData(allData.weather, tomorrowTimes.morningGolden.start);
            const tomSS = WeatherModule.getHourlyData(allData.weather, tomorrowTimes.eveningGolden.end);
            const tomASD = WeatherModule.getHourlyData(allData.airQuality, tomorrowTimes.morningGolden.start);
            const tomASS = WeatherModule.getHourlyData(allData.airQuality, tomorrowTimes.eveningGolden.end);

            tomorrowSunrise = ScoringModule.calculate(
              { hourly: tomSD, aqi: tomASD, offsetCloud: null }, allData.weather, true,
              tomorrowTimes.morningGolden.start, tomorrowAz.sunriseAzimuth
            );
            tomorrowSunrise.timeRange = SunCalcModule.formatTime(tomorrowTimes.morningGolden.start) +
              '-' + SunCalcModule.formatTime(tomorrowTimes.morningGolden.end);

            tomorrowSunset = ScoringModule.calculate(
              { hourly: tomSS, aqi: tomASS, offsetCloud: null }, allData.weather, false,
              tomorrowTimes.eveningGolden.end, tomorrowAz.sunsetAzimuth
            );
            tomorrowSunset.timeRange = SunCalcModule.formatTime(tomorrowTimes.eveningGolden.start) +
              '-' + SunCalcModule.formatTime(tomorrowTimes.eveningGolden.end);
          }

          // Build weather bar data (current hour)
          const currentHour = today.getHours();
          const currentTL = allData.todayTL?.find(h => h.hour === currentHour) || allData.todayTL?.[0] || {};

          this._dataCache = {
            'sunrise-today': todaySunrise,
            'sunset-today': todaySunset,
            'sunrise-tomorrow': tomorrowSunrise,
            'sunset-tomorrow': tomorrowSunset,
            weather: allData.weather,
            todayTL: allData.todayTL,
            tomorrowTL: allData.tomorrowTL,
            sunData: allData.sunData,
            currentWeather: currentTL
          };

          UIModule.renderFullPage(this._dataCache);
          UIModule.hideLoading();

        } catch (err) {
          UIModule.hideLoading();
          UIModule.showError(`数据加载失败: ${err.message}`);
        }
      },

      getPeriodData(key) {
        return this._dataCache[key] || null;
      },

      _autoShowBestFactor() {
        let bestKey = null, bestScore = -1;
        for (const [key, data] of Object.entries(this._dataCache)) {
          if (data && data.score > bestScore) {
            bestScore = data.score;
            bestKey = key;
          }
        }
        if (bestKey) {
          const titles = { 'sunrise-today': '今日朝霞', 'sunset-today': '今日晚霞', 'sunrise-tomorrow': '明日朝霞', 'sunset-tomorrow': '明日晚霞' };
          UIModule.showFactors(titles[bestKey]);
        }
      }
    };

    document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
</body>
</html>
